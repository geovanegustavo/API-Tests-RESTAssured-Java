name: API Tests - CI/CD Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  api-tests:
    name: Run API Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📥 Download do histórico anterior do Allure
        uses: actions/download-artifact@v4
        with:
          name: allure-history
          path: allure-history/
        continue-on-error: true

      - name: 📂 Restaurar histórico para a execução atual
        if: always()
        run: |
          mkdir -p target/allure-results/history
          if [ -d allure-history ]; then
            cp -r allure-history/. target/allure-results/history/
          fi

      - name: 🧪 Executar testes
        env:
          BASE_URL: https://serverest.dev
        run: mvn test -Dbase.url=$BASE_URL

      - name: 📊 Gerar relatório Allure
        if: always()
        run: mvn allure:report

      - name: 💾 Salvar histórico para a próxima execução
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d target/site/allure-maven-plugin/history ]; then
            cp -r target/site/allure-maven-plugin/history/. allure-history/
          fi

      - name: 📤 Upload do histórico como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: allure-history/
          retention-days: 90
          overwrite: true

      - name: 📤 Upload dos resultados Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30
          overwrite: true

      - name: 🌐 Deploy do relatório no GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin

      - name: ✅ Resumo da execução
        if: always()
        run: |
          echo "## 🧪 Resultado dos Testes" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Disparado por | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY